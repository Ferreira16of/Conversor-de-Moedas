<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CurrencyX | Conversor de Moedas Premium & Taxas em Tempo Real</title>

  <!-- SEO Foundation -->
  <meta name="description"
    content="Converta mais de 150 moedas em tempo real com o CurrencyX. Taxas de câmbio precisas, gráficos de tendências, histórico de conversões e design ultra-moderno.">
  <meta name="keywords"
    content="conversor de moedas, câmbio hoje, dólar para real, euro para real, taxas de câmbio, histórico de moedas, tendências cambiais, CurrencyX">
  <meta name="author" content="CurrencyX Studio">
  <meta name="robots" content="index, follow">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="CurrencyX | O Conversor de Moedas Mais Elegante da Web">
  <meta property="og:description"
    content="Taxas em tempo real, histórico completo e gráficos de tendência em uma interface Ultra-Premium.">

  <!-- Twitter -->
  <meta property="twitter:title" content="CurrencyX | Conversor de Moedas Premium">
  <meta property="twitter:description"
    content="Converta moedas com estilo. Taxas precisas e gráficos de tendência em tempo real.">

  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="favicon.svg">

  <!-- Google Search Console Verify -->
  <meta name="google-site-verification" content="lJOC9tTAo_h9CvJI5Rv9t6Vt5bHp2AOsINlZ15OuNQE" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">

  <!-- External Libraries -->
  <script src="https://unpkg.com/feather-icons"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Google Adsense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8923037253221093"
    crossorigin="anonymous"></script>
</head>

<body>
  <!-- Decorative background elements -->
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <main class="app-container">
    <header class="app-header">
      <div class="logo">
        <div class="logo-icon"><i data-feather="trending-up"></i></div>
        <h1>Currency<span>X</span></h1>
      </div>
      <p class="subtitle">Taxas globais em tempo real</p>
    </header>

    <!-- Navigation Tabs -->
    <nav class="tabs">
      <button class="tab-btn active" onclick="switchTab('converter')">
        <i data-feather="refresh-cw"></i> Conversor
      </button>
      <button class="tab-btn" onclick="switchTab('historical')">
        <i data-feather="calendar"></i> Histórico
      </button>
      <button class="tab-btn" onclick="switchTab('trends')">
        <i data-feather="bar-chart-2"></i> Tendências
      </button>
    </nav>

    <!-- Tab Contents -->
    <div class="tab-content active" id="converter-tab">
      <div class="form-card">
        <div class="input-group">
          <label for="valor">Valor para converter</label>
          <div class="input-with-icon">
            <i data-feather="dollar-sign"></i>
            <input type="number" id="valor" placeholder="0.00" step="0.01" oninput="debounceConverter()">
          </div>
        </div>

        <div class="currency-selector">
          <div class="input-group">
            <label for="moedaOrigem">De</label>
            <div class="custom-select-wrapper">
              <select id="moedaOrigem" onchange="updateFlags(); converterMoeda();">
                <option value="BRL" data-flag="br">BRL - Real</option>
                <option value="USD" data-flag="us">USD - Dólar</option>
                <option value="EUR" data-flag="eu">EUR - Euro</option>
                <option value="GBP" data-flag="gb">GBP - Libra</option>
                <option value="JPY" data-flag="jp">JPY - Iene</option>
                <option value="CHF" data-flag="ch">CHF - Franco Suíço</option>
                <option value="CAD" data-flag="ca">CAD - Dólar Can.</option>
                <option value="AUD" data-flag="au">AUD - Dólar Aus.</option>
                <option value="ARS" data-flag="ar">ARS - Peso Arg.</option>
              </select>
            </div>
          </div>

          <button class="swap-btn-large" onclick="swapCurrencies('realtime')" title="Inverter Moedas">
            <i data-feather="repeat"></i>
          </button>

          <div class="input-group">
            <label for="moedaDestino">Para</label>
            <div class="custom-select-wrapper">
              <select id="moedaDestino" onchange="updateFlags(); converterMoeda();">
                <option value="USD" data-flag="us">USD - Dólar</option>
                <option value="BRL" data-flag="br">BRL - Real</option>
                <option value="EUR" data-flag="eu">EUR - Euro</option>
                <option value="GBP" data-flag="gb">GBP - Libra</option>
                <option value="JPY" data-flag="jp">JPY - Iene</option>
                <option value="CHF" data-flag="ch">CHF - Franco Suíço</option>
                <option value="CAD" data-flag="ca">CAD - Dólar Can.</option>
                <option value="AUD" data-flag="au">AUD - Dólar Aus.</option>
                <option value="ARS" data-flag="ar">ARS - Peso Arg.</option>
              </select>
            </div>
          </div>
        </div>

        <div id="resultado" class="main-result-container">
          <div class="result-placeholder">Aguardando valor...</div>
        </div>
      </div>
    </div>

    <div class="tab-content" id="historical-tab">
      <div class="form-card">
        <div class="form-grid">
          <div class="input-group">
            <label for="amount">Valor</label>
            <input type="number" id="amount" step="0.01" placeholder="0.00">
          </div>
          <div class="input-group">
            <label for="date-picker">Data Histórica</label>
            <input type="date" id="date-picker">
          </div>
        </div>

        <div class="currency-selector">
          <div class="input-group">
            <label>Origem</label>
            <div class="custom-select-wrapper">
              <select id="origin-currency">
                <option value="BRL" data-flag="br">BRL - Real</option>
                <option value="USD" data-flag="us" selected>USD - Dólar</option>
                <option value="EUR" data-flag="eu">EUR - Euro</option>
                <option value="ARS" data-flag="ar">ARS - Peso Arg.</option>
              </select>
            </div>
          </div>

          <button type="button" class="swap-btn-large" onclick="swapCurrencies('historical')" title="Inverter Moedas">
            <i data-feather="repeat"></i>
          </button>

          <div class="input-group">
            <label>Destino</label>
            <div class="custom-select-wrapper">
              <select id="destination-currency">
                <option value="BRL" data-flag="br" selected>BRL - Real</option>
                <option value="USD" data-flag="us">USD - Dólar</option>
                <option value="EUR" data-flag="eu">EUR - Euro</option>
                <option value="ARS" data-flag="ar">ARS - Peso Arg.</option>
              </select>
            </div>
          </div>
        </div>

        <button class="btn-action" onclick="fetchHistoricalConversion()">
          <i data-feather="search"></i> Consultar Histórico
        </button>

        <div id="conversion-result" class="historical-result-container"></div>
      </div>
    </div>

    <div class="tab-content" id="trends-tab">
      <div class="form-card">
        <div class="trends-controls">
          <div class="currency-selector mini">
            <div class="input-group">
              <label>De</label>
              <div class="custom-select-wrapper">
                <select id="trend-from" onchange="initTrendsChart()">
                  <option value="USD" data-flag="us" selected>USD</option>
                  <option value="BRL" data-flag="br">BRL</option>
                  <option value="EUR" data-flag="eu">EUR</option>
                  <option value="GBP" data-flag="gb">GBP</option>
                  <option value="ARS" data-flag="ar">ARS</option>
                </select>
              </div>
            </div>

            <button class="swap-btn-mini" onclick="swapTrendsCurrencies()">
              <i data-feather="repeat"></i>
            </button>

            <div class="input-group">
              <label>Para</label>
              <div class="custom-select-wrapper">
                <select id="trend-to" onchange="initTrendsChart()">
                  <option value="BRL" data-flag="br" selected>BRL</option>
                  <option value="USD" data-flag="us">USD</option>
                  <option value="EUR" data-flag="eu">EUR</option>
                  <option value="GBP" data-flag="gb">GBP</option>
                  <option value="ARS" data-flag="ar">ARS</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <div class="chart-header">
          <h3>Tendência (7 dias)</h3>
          <p id="chart-pair">USD / BRL</p>
        </div>
        <div class="chart-container">
          <canvas id="trendsChart"></canvas>
        </div>
      </div>
    </div>

    <footer class="app-footer">
      <p>&copy; 2026 CurrencyX Studio. Todos os direitos reservados.</p>
      <div class="status">
        <span class="status-dot"></span> Online - API v6.0
      </div>
    </footer>
  </main>

  <script src="script.js"></script>
  <script>
    feather.replace();
  </script>
</body>

</html>
